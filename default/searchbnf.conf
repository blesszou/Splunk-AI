[airag-command]
syntax = [ | airag prompt="What is Splunk?"  provider=ollama model="llama3:lastest"]
shortdesc = [Query RAG with LLM]
usage = public

[mcpagent-command]
syntax = [ | mcpagent ]
shortdesc = [MCP query splunk data]
usage = public

[llmchat-command]
syntax = [ | llmchat session="xxx" prompt="analyze the logs"]
shortdesc = [Chat with LLM]
usage = public

